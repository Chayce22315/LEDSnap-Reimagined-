name: LEDSnap CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── 1. SETUP: checkout, install tools, generate project, run core tests ──
  setup:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: ios

      - name: Build core library
        run: |
          cmake -B build
          cmake --build build
        working-directory: core

      - name: Run core tests
        run: ./build/test_compositor
        working-directory: core

      - name: Upload workspace
        uses: actions/upload-artifact@v4
        with:
          name: workspace
          path: |
            core/
            ios/
            pc/
          retention-days: 1

  # ── 2. BUILD MAC: macOS .app via Mac Catalyst ──
  build-mac:
    runs-on: macos-15
    needs: setup
    steps:
      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Build for macOS (Catalyst)
        run: |
          xcodebuild build \
            -project LEDSnap.xcodeproj \
            -scheme LEDSnap \
            -destination 'platform=macOS,variant=Mac Catalyst' \
            -configuration Release \
            -derivedDataPath build/derived \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO
        working-directory: ios

      - name: Package .app
        run: |
          APP_PATH=$(find ios/build/derived -name "LEDSnap.app" -type d | head -1)
          mkdir -p artifacts
          cp -R "$APP_PATH" artifacts/LEDSnap.app
          cd artifacts && zip -ry LEDSnap-macOS.zip LEDSnap.app

      - name: Upload .app
        uses: actions/upload-artifact@v4
        with:
          name: LEDSnap-macOS.app
          path: artifacts/LEDSnap-macOS.zip

  # ── 3. BUILD IPA: unsigned .ipa for iPhone ──
  build-ipa:
    runs-on: macos-15
    needs: setup
    steps:
      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Archive for device
        run: |
          xcodebuild archive \
            -project LEDSnap.xcodeproj \
            -scheme LEDSnap \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/LEDSnap.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO
        working-directory: ios

      - name: Package .ipa
        run: |
          mkdir -p artifacts/Payload
          cp -R ios/build/LEDSnap.xcarchive/Products/Applications/LEDSnap.app artifacts/Payload/
          cd artifacts && zip -ry LEDSnap-unsigned.ipa Payload

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: LEDSnap-unsigned.ipa
          path: artifacts/LEDSnap-unsigned.ipa

  # ── 4. BUILD EXE: Windows .exe for PC receiver ──
  build-exe:
    runs-on: windows-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2 via vcpkg
        run: vcpkg install sdl2:x64-windows

      - name: Configure
        run: |
          cmake -B build `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -A x64
        working-directory: pc

      - name: Build
        run: cmake --build build --config Release
        working-directory: pc

      - name: Package .exe
        run: |
          New-Item -ItemType Directory -Path artifacts -Force
          Copy-Item "pc\build\Release\LEDSnap_Receiver.exe" "artifacts\"
          $sdlDll = Get-ChildItem -Recurse "pc\build" -Filter "SDL2.dll" | Select-Object -First 1
          if ($sdlDll) { Copy-Item $sdlDll.FullName "artifacts\" }

      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: LEDSnap_Receiver-Windows
          path: artifacts/
