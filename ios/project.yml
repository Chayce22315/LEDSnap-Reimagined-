name: LEDSnap
options:
  bundleIdPrefix: com.ledsnap
  deploymentTarget:
    iOS: "16.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"

targets:
  LEDSnap:
    type: application
    platform: iOS
    sources:
      - path: LEDSnap
        type: group
        excludes:
          - LEDSnap-Bridging-Header.h
      - path: ../core/src
        type: group
        buildPhase: sources
        name: CoreEngine-Sources
      - path: ../core/include
        type: group
        buildPhase: headers
        name: CoreEngine-Headers
    settings:
      base:
        INFOPLIST_FILE: LEDSnap/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ledsnap.app
        PRODUCT_NAME: LEDSnap
        SWIFT_OBJC_BRIDGING_HEADER: LEDSnap/LEDSnap-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/../core/include
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: "YES"
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
